<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning de Réalisation — Pôle Médical</title>
    <meta name="description" content="Diagramme de Gantt interactif — Planning de réalisation d'un pôle médical, délai d'exécution 16 mois.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-hover: #1e293b;
            --border: #2a3550;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --accent-orange: #f97316;
            --accent-teal: #14b8a6;
            --accent-indigo: #6366f1;
            --glass-bg: rgba(26, 34, 53, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-effects {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0; overflow: hidden;
        }

        .bg-effects .orb {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.12;
            animation: float 20s ease-in-out infinite;
        }

        .bg-effects .orb:nth-child(1) {
            width: 600px; height: 600px; background: var(--accent-blue);
            top: -10%; left: -5%;
        }
        .bg-effects .orb:nth-child(2) {
            width: 500px; height: 500px; background: var(--accent-purple);
            bottom: -10%; right: -5%; animation-delay: -7s;
        }
        .bg-effects .orb:nth-child(3) {
            width: 400px; height: 400px; background: var(--accent-cyan);
            top: 50%; left: 40%; animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.05); }
            66% { transform: translate(-30px, 40px) scale(0.95); }
        }

        /* ─── Header ─── */
        .header {
            position: relative; z-index: 10;
            padding: 28px 48px;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 26, 0.8);
        }

        .header-top {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .header-icon {
            width: 52px; height: 52px; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .header h1 {
            font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            font-size: 12px; color: var(--text-muted); margin-top: 3px;
            max-width: 600px; line-height: 1.4;
        }

        .header-badges {
            display: flex; gap: 12px; align-items: center;
        }

        .badge {
            padding: 10px 20px; border-radius: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            font-size: 13px; font-weight: 600;
        }

        .badge.primary { color: var(--accent-cyan); }
        .badge.secondary { color: var(--accent-amber); }
        .badge span { color: var(--text-muted); font-weight: 400; }

        .delai-bar {
            margin-top: 12px; padding: 12px 20px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            font-size: 13px; color: var(--text-secondary);
            line-height: 1.5;
        }

        .delai-bar strong { color: var(--accent-blue); font-weight: 700; }

        /* ─── Zoom Controls ─── */
        .controls-bar {
            position: relative; z-index: 10;
            padding: 16px 48px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .progress-info {
            display: flex; gap: 20px; align-items: center;
        }

        .progress-item {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: var(--text-secondary);
        }

        .progress-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }

        .zoom-controls {
            display: flex; gap: 4px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 4px;
        }

        .zoom-btn {
            width: 36px; height: 36px; border: none;
            background: transparent; color: var(--text-secondary);
            border-radius: 8px; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .zoom-btn.active { background: var(--accent-blue); color: white; }

        /* ─── Gantt Container ─── */
        .gantt-container {
            position: relative; z-index: 10;
            padding: 0 48px 48px;
            overflow-x: auto;
        }

        .gantt-wrapper {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        /* ─── Table Layout ─── */
        .gantt-table {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-width: 100%;
        }

        /* Left panel - task names */
        .task-panel {
            border-right: 1px solid var(--border);
        }

        .task-panel-header {
            height: 52px;
            display: flex; align-items: center;
            padding: 0 20px;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .task-item {
            display: flex; align-items: center; gap: 12px;
            padding: 0 20px;
            height: 52px;
            border-bottom: 1px solid rgba(42, 53, 80, 0.3);
            transition: background 0.2s;
            cursor: default;
        }

        .task-item:hover { background: var(--bg-hover); }

        .task-item:last-child { border-bottom: none; }

        .task-color {
            width: 4px; height: 28px;
            border-radius: 2px; flex-shrink: 0;
        }

        .task-info { flex: 1; min-width: 0; }

        .task-name {
            font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .task-duration {
            font-size: 11px; color: var(--text-muted); margin-top: 1px;
        }

        .task-start-badge {
            font-size: 10px; font-weight: 600;
            padding: 2px 8px; border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted); flex-shrink: 0;
        }

        /* Right panel - timeline */
        .timeline-panel {
            overflow-x: auto;
            position: relative;
        }

        .timeline-scroll {
            min-width: 100%;
            position: relative;
        }

        .timeline-header {
            height: 52px;
            display: flex;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            position: sticky; top: 0; z-index: 2;
        }

        .timeline-month {
            flex: 0 0 auto;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            color: var(--text-muted);
            border-right: 1px solid rgba(42, 53, 80, 0.3);
            position: relative;
        }

        .timeline-month .month-label {
            font-size: 10px; font-weight: 500;
            color: var(--text-muted); opacity: 0.7;
            margin-top: 2px;
        }

        .timeline-month.ods {
            color: var(--accent-rose);
            background: rgba(244, 63, 94, 0.08);
        }

        .timeline-month.reception {
            color: var(--accent-emerald);
            background: rgba(16, 185, 129, 0.08);
        }

        .gantt-row {
            height: 52px;
            position: relative;
            border-bottom: 1px solid rgba(42, 53, 80, 0.3);
        }

        .gantt-row:last-child { border-bottom: none; }

        .gantt-row:hover { background: rgba(59, 130, 246, 0.03); }

        /* Grid lines */
        .grid-line {
            position: absolute; top: 0; bottom: 0;
            width: 1px; background: rgba(42, 53, 80, 0.2);
            pointer-events: none;
        }

        .grid-line.major { background: rgba(42, 53, 80, 0.4); }

        /* Bars */
        .gantt-bar {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            height: 30px; border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center;
            padding: 0 10px;
            font-size: 11px; font-weight: 600;
            color: white;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        .gantt-bar::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 50%);
            pointer-events: none;
        }

        .gantt-bar:hover {
            transform: translateY(-50%) scaleY(1.15);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .gantt-bar.milestone {
            width: 28px !important; height: 28px;
            border-radius: 6px;
            transform: translateY(-50%) rotate(45deg);
            padding: 0;
            display: flex; align-items: center; justify-content: center;
        }

        .gantt-bar.milestone:hover {
            transform: translateY(-50%) rotate(45deg) scale(1.2);
        }

        .gantt-bar.milestone .milestone-inner {
            transform: rotate(-45deg);
            font-size: 10px;
        }

        /* ─── ODS & Reception markers ─── */
        .marker {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px; z-index: 3;
            pointer-events: none;
        }

        .marker.ods { background: var(--accent-rose); left: 0; }

        .marker.reception { background: var(--accent-emerald); }

        .marker-label {
            position: absolute; top: 6px;
            font-size: 9px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            white-space: nowrap;
            padding: 2px 6px; border-radius: 4px;
        }

        .marker.ods .marker-label {
            color: var(--accent-rose);
            background: rgba(244, 63, 94, 0.15);
            left: 6px;
        }

        .marker.reception .marker-label {
            color: var(--accent-emerald);
            background: rgba(16, 185, 129, 0.15);
            right: 6px;
        }

        /* ─── Tooltip ─── */
        .tooltip {
            position: fixed; z-index: 1000;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            opacity: 0; transform: translateY(8px);
            transition: all 0.2s ease;
            max-width: 340px;
        }

        .tooltip.visible { opacity: 1; transform: translateY(0); }
        .tooltip-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
        .tooltip-detail { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
        .tooltip-meta {
            display: flex; gap: 16px; margin-top: 10px;
            padding-top: 10px; border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .tooltip-meta-item { font-size: 11px; }
        .tooltip-meta-item span { color: var(--text-muted); }

        /* ─── Legend ─── */
        .legend {
            position: relative; z-index: 10;
            padding: 0 48px 32px;
        }

        .legend-container {
            padding: 18px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            display: flex; flex-wrap: wrap;
            gap: 16px; align-items: center;
        }

        .legend-title {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-muted); margin-right: 8px;
        }

        .legend-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-secondary);
        }

        .legend-swatch {
            width: 14px; height: 8px; border-radius: 3px;
        }

        /* ─── Animations ─── */
        @keyframes barSlide {
            from { opacity: 0; transform: translateY(-50%) scaleX(0); transform-origin: left center; }
            to { opacity: 1; transform: translateY(-50%) scaleX(1); }
        }

        .gantt-bar.animate { animation: barSlide 0.5s ease-out forwards; }

        @media (max-width: 1024px) {
            .header, .controls-bar, .gantt-container, .legend { padding-left: 24px; padding-right: 24px; }
            .task-panel-header, .task-item { padding: 0 12px; }
            .gantt-table { grid-template-columns: 220px 1fr; }
        }
    </style>
</head>
<body>

<div class="bg-effects">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
</div>

<header class="header">
    <div class="header-top">
        <div class="header-left">
            <div class="header-icon">🏗️</div>
            <div>
                <h1>PLANNING DE RÉALISATION</h1>
                <p class="subtitle">Réalisation des travaux d'un pôle médical</p>
            </div>
        </div>
        <div class="header-badges">
            <div class="badge primary"><span>Délai :</span> 16 mois</div>
            <div class="badge secondary"><span>Tâches :</span> 12</div>
        </div>
    </div>
    <div class="delai-bar">
        <strong>Délai d'exécution :</strong> à partir de l'ODS notifié au service co-contractant par le service contractant.
    </div>
</header>

<div class="controls-bar">
    <div class="progress-info">
        <div class="progress-item">
            <div class="progress-dot" style="background: var(--accent-rose)"></div>
            ODS (Ordre de Service)
        </div>
        <div class="progress-item">
            <div class="progress-dot" style="background: var(--accent-emerald)"></div>
            Réception provisoire
        </div>
        <div class="progress-item">
            <div class="progress-dot" style="background: var(--accent-blue)"></div>
            Mois 0 → 16
        </div>
    </div>
    <div class="zoom-controls">
        <button class="zoom-btn" onclick="setZoom(0.7)" title="Zoom arrière">−</button>
        <button class="zoom-btn active" onclick="setZoom(1)" title="Réinitialiser">⊙</button>
        <button class="zoom-btn" onclick="setZoom(1.5)" title="Zoom avant">+</button>
    </div>
</div>

<div class="gantt-container">
    <div class="gantt-wrapper">
        <div class="gantt-table">
            <div class="task-panel" id="taskPanel"></div>
            <div class="timeline-panel" id="timelinePanel">
                <div class="timeline-scroll" id="timelineScroll"></div>
            </div>
        </div>
    </div>
</div>

<div class="legend" id="legend"></div>

<div class="tooltip" id="tooltip">
    <div class="tooltip-title" id="tooltipTitle"></div>
    <div class="tooltip-detail" id="tooltipDetail"></div>
    <div class="tooltip-meta" id="tooltipMeta"></div>
</div>

<script>
const TOTAL_MONTHS = 17; // 0 to 16 inclusive
let monthWidth = 75;

// ─── Task data (from image, scaled to 16 months) ───
const TASKS = [
    {
        name: "Installation de chantier",
        duration: "10 jours",
        startMonth: 0,
        endMonth: 0.35,
        color: "#ef4444",
        gradient: "linear-gradient(135deg, #ef4444, #dc2626)",
        detail: "Mise en place base vie, clôtures, branchements provisoires, signalisation chantier"
    },
    {
        name: "Terrassements / Excavations",
        duration: "2 mois",
        startMonth: 0.35,
        endMonth: 2.35,
        color: "#b91c1c",
        gradient: "linear-gradient(135deg, #b91c1c, #991b1b)",
        detail: "Fouilles en pleine masse, excavations, évacuation des déblais, nivellement"
    },
    {
        name: "Infrastructure",
        duration: "5 mois",
        startMonth: 2,
        endMonth: 7,
        color: "#92400e",
        gradient: "linear-gradient(135deg, #b45309, #92400e)",
        detail: "Fondations, semelles, longrines, dallage, murs de soubassement"
    },
    {
        name: "Superstructure",
        duration: "8 mois",
        startMonth: 4.5,
        endMonth: 12.5,
        color: "#2563eb",
        gradient: "linear-gradient(135deg, #3b82f6, #2563eb)",
        detail: "Poteaux, poutres, planchers, voiles, escaliers, acrotères"
    },
    {
        name: "Maçonnerie et enduits",
        duration: "8 mois",
        startMonth: 5,
        endMonth: 13,
        color: "#16a34a",
        gradient: "linear-gradient(135deg, #22c55e, #16a34a)",
        detail: "Murs en briques/parpaings, cloisons, enduits intérieurs et extérieurs"
    },
    {
        name: "VRD",
        duration: "11 mois",
        startMonth: 2.5,
        endMonth: 13.5,
        color: "#15803d",
        gradient: "linear-gradient(135deg, #15803d, #166534)",
        detail: "Voiries, réseaux divers, assainissement, AEP, espaces extérieurs"
    },
    {
        name: "Électricité / Plomberie",
        duration: "11 mois",
        startMonth: 3,
        endMonth: 14,
        color: "#0ea5e9",
        gradient: "linear-gradient(135deg, #38bdf8, #0ea5e9)",
        detail: "Réseaux électriques courants forts/faibles, plomberie sanitaire, alimentation eau"
    },
    {
        name: "Climatisation / Chauffage",
        duration: "10.5 mois",
        startMonth: 3,
        endMonth: 13.5,
        color: "#7c3aed",
        gradient: "linear-gradient(135deg, #8b5cf6, #7c3aed)",
        detail: "CVC, climatisation centrale, chauffage, ventilation, gaines techniques"
    },
    {
        name: "Finition sol / Peinture",
        duration: "8.5 mois",
        startMonth: 6,
        endMonth: 14.5,
        color: "#c2410c",
        gradient: "linear-gradient(135deg, #ea580c, #c2410c)",
        detail: "Revêtements de sol (carrelage, PVC médical), peinture, faux-plafonds, menuiseries"
    },
    {
        name: "Nettoyage",
        duration: "1.5 mois",
        startMonth: 14,
        endMonth: 15.3,
        color: "#eab308",
        gradient: "linear-gradient(135deg, #facc15, #eab308)",
        detail: "Nettoyage général de fin de chantier, évacuation gravats, nettoyage vitres et sols"
    },
    {
        name: "Essais + Formation + Pré-exploitation",
        duration: "1.5 mois",
        startMonth: 14,
        endMonth: 15.5,
        color: "#14b8a6",
        gradient: "linear-gradient(135deg, #2dd4bf, #14b8a6)",
        detail: "Essais techniques des installations, formation du personnel, mise en route progressive"
    },
    {
        name: "Réception provisoire",
        duration: "—",
        startMonth: 16,
        endMonth: 16,
        color: "#10b981",
        gradient: "linear-gradient(135deg, #34d399, #10b981)",
        detail: "Réception provisoire des travaux, PV de réception, levée des réserves",
        isMilestone: true
    }
];

function init() {
    renderTaskPanel();
    renderTimeline();
    renderLegend();
}

function renderTaskPanel() {
    const panel = document.getElementById('taskPanel');
    let html = '<div class="task-panel-header">Tâches du projet</div>';

    TASKS.forEach((task, i) => {
        const startLabel = task.isMilestone ? `M${Math.round(task.startMonth)}` : `M${Math.ceil(task.startMonth)}`;
        html += `
            <div class="task-item" id="task-label-${i}">
                <div class="task-color" style="background:${task.color}"></div>
                <div class="task-info">
                    <div class="task-name">${task.name}</div>
                    <div class="task-duration">${task.duration}</div>
                </div>
                <div class="task-start-badge">${startLabel}</div>
            </div>
        `;
    });

    panel.innerHTML = html;
}

function renderTimeline() {
    const scroll = document.getElementById('timelineScroll');
    scroll.innerHTML = '';
    scroll.style.width = (TOTAL_MONTHS * monthWidth) + 'px';

    // Header with month numbers
    const header = document.createElement('div');
    header.className = 'timeline-header';

    for (let m = 0; m < TOTAL_MONTHS; m++) {
        const monthDiv = document.createElement('div');
        monthDiv.className = 'timeline-month';
        monthDiv.style.width = monthWidth + 'px';

        if (m === 0) {
            monthDiv.classList.add('ods');
            monthDiv.innerHTML = `<span>ODS</span><span class="month-label">Mois 0</span>`;
        } else if (m === 16) {
            monthDiv.classList.add('reception');
            monthDiv.innerHTML = `<span>${m}</span><span class="month-label">Réc. Prov.</span>`;
        } else {
            monthDiv.innerHTML = `<span>${m}</span><span class="month-label">Mois ${m}</span>`;
        }

        header.appendChild(monthDiv);
    }
    scroll.appendChild(header);

    // Rows container
    const rowsContainer = document.createElement('div');
    rowsContainer.style.position = 'relative';

    TASKS.forEach((task, i) => {
        const row = document.createElement('div');
        row.className = 'gantt-row';
        row.id = `gantt-row-${i}`;

        // Grid lines
        for (let m = 0; m < TOTAL_MONTHS; m++) {
            const line = document.createElement('div');
            line.className = 'grid-line' + (m % 4 === 0 ? ' major' : '');
            line.style.left = (m * monthWidth) + 'px';
            row.appendChild(line);
        }

        // ODS marker (month 0)
        if (i === 0) {
            const odsMarker = document.createElement('div');
            odsMarker.className = 'marker ods';
            odsMarker.style.left = '0px';
            odsMarker.innerHTML = '<div class="marker-label">ODS</div>';
            row.appendChild(odsMarker);
        }

        // Reception marker (month 16)
        if (i === TASKS.length - 1) {
            const recMarker = document.createElement('div');
            recMarker.className = 'marker reception';
            recMarker.style.left = (16 * monthWidth) + 'px';
            recMarker.innerHTML = '<div class="marker-label">RÉC.</div>';
            row.appendChild(recMarker);
        }

        // Bar
        if (task.isMilestone) {
            const bar = document.createElement('div');
            bar.className = 'gantt-bar milestone animate';
            bar.style.left = (task.startMonth * monthWidth - 14) + 'px';
            bar.style.background = task.gradient;
            bar.style.animationDelay = (i * 0.06) + 's';
            bar.innerHTML = '<span class="milestone-inner">◆</span>';
            bar.onmouseenter = (e) => showTooltip(e, task);
            bar.onmouseleave = hideTooltip;
            bar.onmousemove = moveTooltip;
            row.appendChild(bar);
        } else {
            const bar = document.createElement('div');
            bar.className = 'gantt-bar animate';
            const leftPx = task.startMonth * monthWidth + 2;
            const widthPx = Math.max((task.endMonth - task.startMonth) * monthWidth - 4, 24);
            bar.style.left = leftPx + 'px';
            bar.style.width = widthPx + 'px';
            bar.style.background = task.gradient;
            bar.style.animationDelay = (i * 0.06) + 's';

            if (widthPx > 90) {
                bar.textContent = task.name;
            }

            bar.onmouseenter = (e) => showTooltip(e, task);
            bar.onmouseleave = hideTooltip;
            bar.onmousemove = moveTooltip;
            row.appendChild(bar);
        }

        rowsContainer.appendChild(row);
    });

    scroll.appendChild(rowsContainer);

    // Animate bars in
    setTimeout(() => {
        document.querySelectorAll('.gantt-bar.animate').forEach((bar, i) => {
            bar.style.opacity = '0';
            setTimeout(() => { bar.style.opacity = '1'; }, i * 60);
        });
    }, 100);
}

function setZoom(level) {
    monthWidth = 75 * level;
    document.querySelectorAll('.zoom-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderTimeline();
}

function showTooltip(e, task) {
    const tooltip = document.getElementById('tooltip');
    document.getElementById('tooltipTitle').textContent = task.name;
    document.getElementById('tooltipTitle').style.color = task.color;
    document.getElementById('tooltipDetail').textContent = task.detail;

    let meta = `<div class="tooltip-meta-item"><span>Durée :</span> ${task.duration}</div>`;
    if (!task.isMilestone) {
        meta += `<div class="tooltip-meta-item"><span>Début :</span> Mois ${Math.round(task.startMonth * 10) / 10}</div>`;
        meta += `<div class="tooltip-meta-item"><span>Fin :</span> Mois ${Math.round(task.endMonth * 10) / 10}</div>`;
    } else {
        meta += `<div class="tooltip-meta-item"><span>Jalon :</span> Mois 16</div>`;
    }
    document.getElementById('tooltipMeta').innerHTML = meta;
    tooltip.classList.add('visible');
    moveTooltip(e);
}

function moveTooltip(e) {
    const tooltip = document.getElementById('tooltip');
    tooltip.style.left = Math.min(e.clientX + 16, window.innerWidth - 360) + 'px';
    tooltip.style.top = Math.min(e.clientY + 16, window.innerHeight - 160) + 'px';
}

function hideTooltip() {
    document.getElementById('tooltip').classList.remove('visible');
}

function renderLegend() {
    const container = document.getElementById('legend');
    let html = '<div class="legend-container"><span class="legend-title">Légende</span>';
    TASKS.forEach(task => {
        html += `
            <div class="legend-item">
                <div class="legend-swatch" style="background:${task.gradient}"></div>
                ${task.name}
            </div>
        `;
    });
    html += '</div>';
    container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
